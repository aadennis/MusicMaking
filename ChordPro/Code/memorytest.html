<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chord Memory Test MVP</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      color: #eee;
      text-align: center;
    }
    #display {
      font-size: 2rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<input type="file" id="fileInput" accept=".txt">
<div id="display"></div>

<script>
  const display = document.getElementById("display");

  function showForSeconds(text, seconds) {
    return new Promise(resolve => {
      display.textContent = text;
      setTimeout(resolve, seconds * 1000);
    });
  }

  function parseChordPro(text) {
    const lines = text.split(/\r?\n/);

    let title = null;
    const sections = [];
    const sectionNames = ["verse", "chorus", "bridge", "intro", "outro"];

    for (const line of lines) {
      // Title
      const titleMatch = line.match(/\{title:\s*(.+?)\s*\}/i);
      if (titleMatch) title = titleMatch[1];

      // Section markers
      const sectionMatch = line.match(/\{(\w+)\s*:?\s*\}/);
      if (sectionMatch) {
        const sec = sectionMatch[1].toLowerCase();
        if (sectionNames.includes(sec) && !sections.includes(sec)) {
          sections.push(sec.charAt(0).toUpperCase() + sec.slice(1));
        }
      }
    }

    return { title, sections };
  }

  async function runTest(data) {
    if (data.title) {
      await showForSeconds(`Title: ${data.title}`, 3);
    }
    for (const sec of data.sections) {
      await showForSeconds(`${sec}`, 3);
    }
    display.textContent = "";
  }

  document.getElementById("fileInput").addEventListener("change", function() {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      const text = e.target.result;
      const data = parseChordPro(text);
      runTest(data);
    };
    reader.readAsText(file);
  });
</script>

</body>
</html>
